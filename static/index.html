<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Albot Console</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #12141A;
    --panel: #1A1D24;
    --panel-alt: #20232C;
    --border: #262A33;
    --text: #E6E8EB;
    --text-muted: #7D8590;
    --accent: #4FD1C5;
    --accent-dim: #2B7A73;
    --warn: #E8A33D;
    --danger: #E5534B;
    --radius: 6px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .mono { font-family: 'IBM Plex Mono', monospace; }

  /* ステータスバー(シグネチャ要素) */
  #statusbar {
    display: flex;
    align-items: center;
    gap: 24px;
    padding: 10px 20px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--text-muted);
    flex-shrink: 0;
  }
  #statusbar .item { display: flex; align-items: center; gap: 6px; }
  #statusbar .val { color: var(--text); }
  .pulse {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 0 0 rgba(79, 209, 197, 0.5);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(79, 209, 197, 0.4); }
    70% { box-shadow: 0 0 0 6px rgba(79, 209, 197, 0); }
    100% { box-shadow: 0 0 0 0 rgba(79, 209, 197, 0); }
  }

  #body { display: flex; flex: 1; min-height: 0; }

  /* サイドコンソール */
  #sidebar {
    width: 300px;
    background: var(--panel);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 16px;
    flex-shrink: 0;
  }
  .section { margin-bottom: 22px; }
  .section-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.06em;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .section-label::before {
    content: '';
    width: 3px; height: 12px;
    background: var(--accent-dim);
  }

  input[type=text], input[type=password], select, textarea {
    width: 100%;
    background: var(--panel-alt);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 7px 9px;
    border-radius: var(--radius);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    margin-bottom: 6px;
  }
  input:focus, select:focus, textarea:focus {
    outline: none;
    border-color: var(--accent-dim);
  }

  button {
    background: var(--panel-alt);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 7px 12px;
    border-radius: var(--radius);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    cursor: pointer;
  }
  button:hover { border-color: var(--accent-dim); color: var(--accent); }
  button.primary { background: var(--accent-dim); border-color: var(--accent-dim); color: #0D1117; }
  button.primary:hover { color: #0D1117; }
  button.full { width: 100%; }

  .session-list, .search-results { list-style: none; padding: 0; margin: 8px 0 0; }
  .session-list li {
    display: flex; justify-content: space-between; align-items: center;
    padding: 6px 8px;
    font-size: 13px;
    border-radius: var(--radius);
    cursor: pointer;
    color: var(--text-muted);
  }
  .session-list li:hover { background: var(--panel-alt); color: var(--text); }
  .session-list li.active { color: var(--accent); }
  .session-list .del { color: var(--danger); opacity: 0; font-size: 11px; }
  .session-list li:hover .del { opacity: 1; }

  .search-result {
    background: var(--panel-alt);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 8px 10px;
    margin-bottom: 6px;
    font-size: 12px;
  }
  .search-result .title { color: var(--accent); font-weight: 500; margin-bottom: 2px; }
  .search-result .url { color: var(--text-muted); font-size: 11px; word-break: break-all; margin-bottom: 4px; }
  .search-result .desc { color: var(--text-muted); line-height: 1.4; }

  /* メインチャット */
  #main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  #log { flex: 1; overflow-y: auto; padding: 24px; }
  .msg { margin-bottom: 18px; max-width: 720px; }
  .msg .role {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 4px;
  }
  .msg.user .role { color: var(--accent); }
  .msg .content { line-height: 1.6; font-size: 14px; white-space: pre-wrap; }
  .msg.system .content { color: var(--text-muted); font-family: 'IBM Plex Mono', monospace; font-size: 12px; }

  #inputArea {
    display: flex;
    gap: 10px;
    padding: 16px 24px;
    background: var(--panel);
    border-top: 1px solid var(--border);
  }
  #inputArea input { margin-bottom: 0; }
  #inputArea button { flex-shrink: 0; }

  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>

<div id="statusbar">
  <div class="item"><span class="pulse"></span><span>online</span></div>
  <div class="item">model <span class="val" id="sbModel">-</span></div>
  <div class="item">session <span class="val" id="sbSession">-</span></div>
  <div class="item">uptime <span class="val" id="sbUptime">-</span></div>
</div>

<div id="body">
  <div id="sidebar">

    <div class="section">
      <div class="section-label">接続</div>
      <input type="password" id="tokenInput" placeholder="APIトークン">
      <button class="full" onclick="saveToken()">保存して接続</button>
    </div>

    <div class="section">
      <div class="section-label">モデル</div>
      <select id="modelSelect" onchange="switchModel()">
        <option value="gemini-3.1-flash-lite">gemini-3.1-flash-lite</option>
        <option value="gemini-3-flash-preview">gemini-3-flash-preview</option>
        <option value="gemini-3.1-pro-preview">gemini-3.1-pro-preview</option>
        <option value="gpt-4o-mini">gpt-4o-mini</option>
        <option value="gpt-4o">gpt-4o</option>
      </select>
    </div>

    <div class="section">
      <div class="section-label">セッション</div>
      <input type="text" id="newSession" placeholder="新規セッション名">
      <button class="full" onclick="switchSession()">切り替え / 作成</button>
      <ul class="session-list" id="sessionList"></ul>
    </div>

    <div class="section">
      <div class="section-label">Web検索</div>
      <input type="text" id="searchQuery" placeholder="検索キーワード">
      <div style="display:flex; gap:6px; margin-bottom:6px;">
        <input type="text" id="searchCount" value="5" style="width:56px;" title="件数">
        <button style="flex:1;" onclick="runSearch()">検索</button>
      </div>
      <ul class="search-results" id="searchResults"></ul>
    </div>

    <div class="section">
      <button class="full" onclick="refreshStatus()">ステータス更新</button>
    </div>

  </div>

  <div id="main">
    <div id="log"></div>
    <div id="inputArea">
      <input type="text" id="messageInput" placeholder="メッセージを入力..." onkeydown="if(event.key==='Enter') sendMessage()">
      <button class="primary" onclick="sendMessage()">送信</button>
    </div>
  </div>
</div>

<script>
function getToken() { return localStorage.getItem('apiToken') || ''; }

function saveToken() {
  localStorage.setItem('apiToken', document.getElementById('tokenInput').value);
  logSystem('トークンを保存しました');
  refreshStatus();
}

async function api(path, options = {}) {
  const res = await fetch('/api' + path, {
    ...options,
    headers: { ...options.headers, 'x-api-token': getToken(), 'Content-Type': 'application/json' }
  });
  if (!res.ok) throw new Error('リクエスト失敗 (' + res.status + ')');
  const ct = res.headers.get('content-type') || '';
  return ct.includes('json') ? res.json() : null;
}

function logSystem(text) {
  const log = document.getElementById('log');
  const div = document.createElement('div');
  div.className = 'msg system';
  div.innerHTML = '<div class="content">' + text + '</div>';
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
}

function appendMsg(role, text) {
  const log = document.getElementById('log');
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  const label = role === 'user' ? 'you' : 'albot';
  div.innerHTML = '<div class="role">' + label + '</div><div class="content"></div>';
  div.querySelector('.content').textContent = text;
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
}

async function sendMessage() {
  const input = document.getElementById('messageInput');
  const text = input.value.trim();
  if (!text) return;
  appendMsg('user', text);
  input.value = '';
  try {
    const data = await api('/chat', { method: 'POST', body: JSON.stringify({ message: text }) });
    appendMsg('bot', data.reply);
  } catch (e) {
    logSystem('エラー: ' + e.message);
  }
}

async function refreshStatus() {
  try {
    const status = await api('/status');
    document.getElementById('sbModel').textContent = status.current_model;
    document.getElementById('sbSession').textContent = status.current_session;
    document.getElementById('sbUptime').textContent = formatUptime(status.uptime_seconds);
    document.getElementById('modelSelect').value = status.current_model;

    const sessions = await api('/sessions');
    const list = document.getElementById('sessionList');
    list.innerHTML = '';
    sessions.forEach(s => {
      const li = document.createElement('li');
      if (s === status.current_session) li.classList.add('active');
      li.innerHTML = '<span>' + s + '</span><span class="del">削除</span>';
      li.querySelector('span').onclick = null;
      li.onclick = (e) => {
        if (e.target.classList.contains('del')) {
          if (confirm('セッション「' + s + '」を削除しますか?')) {
            api('/sessions/' + encodeURIComponent(s), { method: 'DELETE' }).then(refreshStatus);
          }
        } else {
          document.getElementById('newSession').value = s;
          switchSession();
        }
      };
      list.appendChild(li);
    });
  } catch (e) {
    logSystem('ステータス取得失敗。トークンを確認してください。');
  }
}

function formatUptime(sec) {
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  return h + 'h ' + m + 'm';
}

async function switchModel() {
  const name = document.getElementById('modelSelect').value;
  await api('/model', { method: 'POST', body: JSON.stringify({ name }) });
  logSystem('モデルを ' + name + ' に切り替えました');
  refreshStatus();
}

async function switchSession() {
  const name = document.getElementById('newSession').value.trim();
  if (!name) return;
  await api('/sessions/switch', { method: 'POST', body: JSON.stringify({ name }) });
  logSystem('セッションを「' + name + '」に切り替えました');
  document.getElementById('newSession').value = '';
  refreshStatus();
}

async function runSearch() {
  const query = document.getElementById('searchQuery').value.trim();
  const count = parseInt(document.getElementById('searchCount').value) || 5;
  if (!query) return;
  const resultsEl = document.getElementById('searchResults');
  resultsEl.innerHTML = '<li class="mono" style="color:var(--text-muted); font-size:11px;">検索中...</li>';
  try {
    const results = await api('/search', { method: 'POST', body: JSON.stringify({ query, count }) });
    resultsEl.innerHTML = '';
    if (results.length === 0) {
      resultsEl.innerHTML = '<li class="mono" style="color:var(--text-muted); font-size:11px;">結果なし</li>';
      return;
    }
    results.forEach(r => {
      const li = document.createElement('div');
      li.className = 'search-result';
      li.innerHTML =
        '<div class="title">' + escapeHtml(r.title) + '</div>' +
        '<div class="url">' + escapeHtml(r.url) + '</div>' +
        '<div class="desc">' + escapeHtml(r.description) + '</div>';
      resultsEl.appendChild(li);
    });
  } catch (e) {
    resultsEl.innerHTML = '<li class="mono" style="color:var(--danger); font-size:11px;">検索失敗</li>';
  }
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

document.getElementById('tokenInput').value = getToken();
refreshStatus();
setInterval(refreshStatus, 30000);
</script>

</body>
</html>
