<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Bot管理コンソール</title>
<style>
  body { font-family: sans-serif; background: #1e1f22; color: #ddd; display: flex; height: 100vh; margin: 0; }
  #sidebar { width: 260px; background: #2b2d31; padding: 16px; box-sizing: border-box; overflow-y: auto; }
  #main { flex: 1; display: flex; flex-direction: column; }
  #log { flex: 1; overflow-y: auto; padding: 16px; }
  #inputArea { display: flex; padding: 12px; background: #2b2d31; }
  #inputArea input { flex: 1; padding: 8px; border-radius: 4px; border: none; }
  #inputArea button { margin-left: 8px; padding: 8px 16px; }
  .msg { margin-bottom: 12px; }
  .msg.user { text-align: right; color: #7cc4ff; }
  .msg.bot { color: #ddd; }
  select, input[type=text] { width: 100%; margin-bottom: 8px; padding: 6px; box-sizing: border-box; }
  h3 { font-size: 14px; color: #999; }
  #tokenBox { margin-bottom: 16px; }
  ul { list-style: none; padding: 0; }
  li { padding: 4px 0; cursor: pointer; }
  li:hover { text-decoration: underline; }
</style>
</head>
<body>

<div id="sidebar">
  <div id="tokenBox">
    <h3>APIトークン</h3>
    <input type="password" id="tokenInput" placeholder="トークンを入力">
    <button onclick="saveToken()">保存</button>
  </div>

  <h3>ステータス</h3>
  <div id="status">未取得</div>

  <h3>モデル</h3>
  <select id="modelSelect" onchange="switchModel()">
    <option value="gemini-3.1-flash-lite">gemini-3.1-flash-lite</option>
    <option value="gemini-3-flash-preview">gemini-3-flash-preview</option>
    <option value="gemini-3.1-pro-preview">gemini-3.1-pro-preview</option>
    <option value="gpt-4o-mini">gpt-4o-mini</option>
    <option value="gpt-4o">gpt-4o</option>
  </select>

  <h3>セッション</h3>
  <input type="text" id="newSession" placeholder="新しいセッション名">
  <button onclick="switchSession()">切り替え/作成</button>
  <ul id="sessionList"></ul>

  <button onclick="refreshStatus()">更新</button>
</div>

<div id="main">
  <div id="log"></div>
  <div id="inputArea">
    <input type="text" id="messageInput" placeholder="メッセージを入力..." onkeydown="if(event.key==='Enter') sendMessage()">
    <button onclick="sendMessage()">送信</button>
  </div>
</div>

<script>
function getToken() { return localStorage.getItem('apiToken') || ''; }
function saveToken() {
  localStorage.setItem('apiToken', document.getElementById('tokenInput').value);
  refreshStatus();
}

async function api(path, options = {}) {
  const res = await fetch('/api' + path, {
    ...options,
    headers: { ...options.headers, 'x-api-token': getToken(), 'Content-Type': 'application/json' }
  });
  if (!res.ok) throw new Error('API error: ' + res.status);
  return res.status === 200 && res.headers.get('content-type')?.includes('json') ? res.json() : null;
}

async function sendMessage() {
  const input = document.getElementById('messageInput');
  const text = input.value.trim();
  if (!text) return;
  appendMsg('user', text);
  input.value = '';
  try {
    const data = await api('/chat', { method: 'POST', body: JSON.stringify({ message: text }) });
    appendMsg('bot', data.reply);
  } catch (e) {
    appendMsg('bot', 'エラー: ' + e.message);
  }
}

function appendMsg(role, text) {
  const log = document.getElementById('log');
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.textContent = text;
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
}

async function refreshStatus() {
  try {
    const status = await api('/status');
    document.getElementById('status').textContent =
      `モデル: ${status.current_model}\nセッション: ${status.current_session}\n件数: ${status.session_count}\n稼働: ${status.uptime_seconds}秒`;
    document.getElementById('modelSelect').value = status.current_model;

    const sessions = await api('/sessions');
    const list = document.getElementById('sessionList');
    list.innerHTML = '';
    sessions.forEach(s => {
      const li = document.createElement('li');
      li.textContent = s + ' 🗑';
      li.onclick = async () => {
        if (confirm(`セッション「${s}」を削除しますか?`)) {
          await api('/sessions/' + encodeURIComponent(s), { method: 'DELETE' });
          refreshStatus();
        }
      };
      list.appendChild(li);
    });
  } catch (e) {
    document.getElementById('status').textContent = '取得失敗(トークンを確認してください)';
  }
}

async function switchModel() {
  const name = document.getElementById('modelSelect').value;
  await api('/model', { method: 'POST', body: JSON.stringify({ name }) });
  refreshStatus();
}

async function switchSession() {
  const name = document.getElementById('newSession').value.trim();
  if (!name) return;
  await api('/sessions/switch', { method: 'POST', body: JSON.stringify({ name }) });
  document.getElementById('newSession').value = '';
  refreshStatus();
}

document.getElementById('tokenInput').value = getToken();
refreshStatus();
</script>

</body>
</html>
