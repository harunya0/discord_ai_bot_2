<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Albot Console</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="/css/base.css">
<link rel="stylesheet" href="/css/statusbar.css">
<link rel="stylesheet" href="/css/sidebar.css">
<link rel="stylesheet" href="/css/chat.css">
<link rel="stylesheet" href="/css/files.css">
<link rel="stylesheet" href="/css/responsive.css">
</head>
<body>

<div id="overlay" class="overlay" onclick="toggleSidebar()"></div>

<div id="statusbar">
  <button id="menuToggle" class="menu-toggle" onclick="toggleSidebar()">☰ MENU</button>
  <div class="item"><span class="pulse"></span><span>online</span></div>
  <div class="item">model <span class="val" id="sbModel">-</span></div>
  <div class="item">channel <span class="val" id="sbChannel">0</span></div>
  <div class="item">session <span class="val" id="sbSession">-</span></div>
  <div class="item">uptime <span class="val" id="sbUptime">-</span></div>
</div>

<div id="body">
  <div id="sidebar">

    <div class="section">
      <div class="section-label">接続</div>
      <input type="password" id="tokenInput" placeholder="APIトークン">
      <button class="full" onclick="saveToken()">保存して接続</button>
    </div>

    <div class="section">
      <div class="section-label">モデル</div>
      <select id="modelSelect" onchange="switchModel()">
        <option value="gemini-3.1-flash-lite">gemini-3.1-flash-lite</option>
        <option value="gemini-3-flash-preview">gemini-3-flash-preview</option>
        <option value="gemini-3.1-pro-preview">gemini-3.1-pro-preview</option>
        <option value="gpt-4o-mini">gpt-4o-mini</option>
        <option value="gpt-4o">gpt-4o</option>
      </select>
    </div>

    <div class="section">
      <div class="section-label">セッション</div>
      <input type="text" id="newSession" placeholder="新規セッション名">
      <button class="full" onclick="switchSession()">切り替え / 作成</button>
      <ul class="session-list" id="sessionList"></ul>
    </div>

    <div class="section">
      <div class="section-label">Web検索</div>
      <input type="text" id="searchQuery" placeholder="検索キーワード">
      <div style="display:flex; gap:6px; margin-bottom:6px;">
        <input type="text" id="searchCount" value="5" style="width:56px;" title="件数">
        <button style="flex:1;" onclick="runSearch()">検索</button>
      </div>
      <ul class="search-results" id="searchResults"></ul>
    </div>

    <div class="section">
      <button class="full" onclick="refreshStatus()">ステータス更新</button>
    </div>

    <div class="section">
      <div class="section-label">同期チャンネル (Discord ID)</div>
      <input type="text" id="channelInput" placeholder="0 (Web単独) または チャンネルID">
      <button class="full" onclick="switchChannel()">チャンネル切り替え</button>
    </div>

  </div>

  <div id="main">
    <div id="log"></div>
    <div id="filePreview" class="file-preview"></div>
    <div id="inputArea">
      <input type="file" id="fileInput" multiple style="display: none" onchange="handleFileSelect(event)">
      <button class="icon-btn" onclick="document.getElementById('fileInput').click()" title="ファイルを添付">📎</button>

      <textarea id="messageInput" placeholder="メッセージを入力..."></textarea>
      <button class="primary" onclick="sendMessage()">送信</button>
    </div>
  </div>
</div>

<!-- 外部ライブラリ（Markdown描画とサニタイズ） -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>

<!-- アプリ本体。依存関係の順に読み込む -->
<script src="/js/utils.js"></script>
<script src="/js/api.js"></script>
<script src="/js/state.js"></script>
<script src="/js/files.js"></script>
<script src="/js/chat.js"></script>
<script src="/js/status.js"></script>
<script src="/js/search.js"></script>
<script src="/js/sidebar.js"></script>
<script src="/js/main.js"></script>
</body>
</html>
